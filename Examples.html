<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jet Designations - Examples & Videos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f0f0f0;
            color: #333;
            line-height: 1.6;
        }

        nav {
            background: #222;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .nav-logo {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
        }

        .nav-links a:hover, .nav-links a.active {
            background: #444;
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        header {
            text-align: center;
            background: #333;
            color: white;
            padding: 2rem 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #ddd;
        }

        .video-section {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .video-section h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #222;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 1rem;
            background: #000;
        }

        .video-container video, .video-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-section p {
            margin-bottom: 0.5rem;
        }

        .video-section aside {
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
        }

        footer {
            text-align: center;
            background: #222;
            color: #bbb;
            padding: 1.5rem;
            margin-top: 4rem;
            border-radius: 8px 8px 0 0;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.7rem;
            }
            .nav-container {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="Index.html" class="nav-logo">JetCodes</a>
            <div class="nav-links">
                <a href="Index.html">Home</a>
                <a href="details.html">Details</a>
                <a href="examples.html" class="active">Examples</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>Jet Designation Examples & Videos</h1>
            <p>Watch videos of different jet types</p>
        </header>

        <div class="video-section">
            <h2>F (Fighter)</h2>
            <div class="video-container">
                <video controls>
                    <source src="Rickroll.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <p>This fighter jet is the F-117 Nighthawk</p>
        </div>

        <div class="video-section">
            <h2>B (Bomber)</h2>
            <div class="video-container">
                <video controls>
                    <source src="B.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <p>This video features the B-2 Spirit in action</p>
        </div>

        <div class="video-section">
            <h2>A (Attack)</h2>
            <div class="video-container">
                <video controls>
                    <source src="A10.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <p>The A-10 Thunderbolt II has a unique sound</p>
        </div>
